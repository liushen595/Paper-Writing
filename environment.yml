# ML 环境依赖清单
#
# 重建方式（按 AGENTS.md 约定：只用 pip，不用 conda install 装包）：
#   conda create -n ML python=3.10 -y
#   conda activate ML
#   pip install -i https://pypi.tuna.tsinghua.edu.cn/simple -r <(awk '/^  - /{print $2}' environment.yml)
#
# 说明：
#   - torch/torchvision 走 PyPI 官方 wheel，自带 CUDA 12.4 运行时，无需单独装 cuda toolkit
#   - bitsandbytes 走 PyPI 官方 wheel，自带 CUDA 后端（conda-forge 的 build 是 CPU-only，会导
#     致 4-bit QLoRA 静默退化，曾因此让 WSL 安装时崩溃，故改用 pip）
#   - 所有版本固定为开发时验证通过的确切版本
#   - 由 pip-chill + pip list --format=freeze 导出，剔除了纯传递依赖（保留必要的运行时依赖）

name: ML
channels:
  - defaults
dependencies:
  - python=3.10.20
  - pip=26.1.2
  - pip:
      # === 深度学习核心 ===
      - torch==2.5.1                # +cu124, CUDA 12.4 自带
      - torchvision==0.20.1
      - triton==3.1.0
      - bitsandbytes==0.49.2        # 4-bit QLoRA, CUDA 后端
      - accelerate==1.14.0
      - peft==0.19.1
      - trl==0.12.2
      - transformers==4.44.1
      - tokenizers==0.19.1
      - huggingface-hub==0.34.4
      - safetensors==0.7.0
      - sentencepiece==0.2.0
      - datasets==4.4.1
      # NVIDIA CUDA 库（torch 的依赖，固定版本以保证 4-bit 量化对齐）===
      - nvidia-cublas-cu12==12.4.5.8
      - nvidia-cuda-cupti-cu12==12.4.127
      - nvidia-cuda-nvrtc-cu12==12.4.127
      - nvidia-cuda-runtime-cu12==12.4.127
      - nvidia-cudnn-cu12==9.1.0.70
      - nvidia-cufft-cu12==11.2.1.3
      - nvidia-curand-cu12==10.3.5.147
      - nvidia-cusolver-cu12==11.6.1.9
      - nvidia-cusparse-cu12==12.3.1.170
      - nvidia-nccl-cu12==2.21.5
      - nvidia-nvjitlink-cu12==12.4.127
      - nvidia-nvtx-cu12==12.4.127
      # === 科学计算 ===
      - numpy==2.0.1
      - scipy==1.15.3
      - pandas==2.3.3
      - scikit-learn==1.7.2
      - statsmodels==0.14.6
      # === 可视化 ===
