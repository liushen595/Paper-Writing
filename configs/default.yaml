# 犯罪意图识别框架 — 实验配置
# 当前开发机 RTX 4060 8GB，参数调至最保守；服务器训练时按注释恢复
seed: 42

data:
  raw_doj: "crawler/output/doj_raw.jsonl"
  synthesized_dir: "data/synthesized"
  preference_dir: "data/preference"
  blind_dir: "data/blind"
  train_ratio: 0.8
  seed: 42
  max_text_len: 512
  haystack_path: "data/haystack/wildchat_nontoxic.jsonl"  # WildChat-nontoxic 英文子集
  haystack_size: 5000                                     # 草垛采样条数（FPR 分母）

sft:
  base_model: "Qwen/Qwen3-8B"
  lora_r: 64           # RTX 4060: 16; 服务器: 64
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  bits: 4
  double_quant: true
  quant_type: "nf4"
  cls_loss_weight: 1.0
  clm_loss_weight: 1.0
  use_roberta_distill: false
  learning_rate: 5.0e-5
  num_epochs: 3
  per_device_batch_size: 4      # RTX 4060: 1; 服务器: 4
  gradient_accumulation_steps: 4 # RTX 4060: 16 (等效 batch=16); 服务器: 4
  warmup_ratio: 0.03
  max_seq_len: 1024               # RTX 4060: 512; 服务器: 1024
  early_stopping_patience: 3
  early_stopping_min_delta: 1.0e-4
  output_dir: "checkpoints/sft"

dpo:
  beta: 0.1
  learning_rate: 5.0e-7
  num_epochs: 1
  per_device_batch_size: 2       # RTX 4060: 1; 服务器: 2
  gradient_accumulation_steps: 8 # RTX 4060: 16; 服务器: 8
  max_prompt_len: 256
  max_length: 1024                # RTX 4060: 512; 服务器: 1024
  early_stopping_patience: 2
  early_stopping_min_delta: 1.0e-5
  output_dir: "checkpoints/dpo"

implicit_cot:
  sft_ckpt: "checkpoints/sft"
  delta_per_epoch: 8
  lambda_smoothing: 4.0
  reset_optimizer_on_removal: true
  left_removal: true
  learning_rate: 1.0e-5
  num_epochs: 20
  per_device_batch_size: 4       # RTX 4060: 1; 服务器: 4
  gradient_accumulation_steps: 4 # RTX 4060: 16; 服务器: 4
  max_seq_len: 1024               # RTX 4060: 512; 服务器: 1024
  early_stopping_patience: 3
  early_stopping_min_delta: 1.0e-4
  output_dir: "checkpoints/implicit_cot"

eval:
  blind_csv: "data/blind/test_blind.csv"
  threshold: 0.5
  baselines: ["toxic-bert", "qwen-zeroshot", "explicit-cot", "sft-no-dpo", "dpo-only", "implicit-cot"]
  judge_provider: "agnes"
  judge_swap_positions: true
  judge_reference_guided: true
  output_dir: "outputs/eval"
